esphome:
  name: lorasender2
      
esp32:
  board: esp32dev
  framework:
    type: arduino

external_components:
  - source: github://dala318/esphome@sx127x-transport
    components:
      - sx127x
      - packet_transport

# Enable logging
logger:
  level: INFO
  
# Enable Home Assistant API
#api:
#  password: "5523434a"

#ota:
#  - platform: esphome
#    password: "5523434a"

#wifi:
#  ssid: "DOMOTICACASA"
#  password: "33333333"

#time:
#  - platform: sntp
#    id: loragatewaytime

#web_server:
#  port: 80

globals:      
  - id: totalcount
    type: int
    restore_value: no   # keeps value after reboot
    initial_value: '0'

  - id: gatewaycount
    type: int
    restore_value: no   # keeps value after reboot
    initial_value: '0'

  - id: temperaturecount
    type: int
    restore_value: no   # keeps value after reboot
    initial_value: '0'    
button:
  - platform: restart
    id: restart_button
    name: "Restart LORA Sender"

    
interval:
  - interval: 1440min
    startup_delay: 1440min
    then:
      - logger.log: "Rebooting device (scheduled restart)..."
      - delay: 200ms
      - button.press: restart_button

          
    
#I2C for OLED display
i2c:
  sda: GPIO21
  scl: GPIO22
  frequency: 400kHz
  
spi:
  clk_pin: GPIO5
  mosi_pin: GPIO27
  miso_pin: GPIO19

sx127x:
  dio0_pin: GPIO26
  cs_pin: GPIO18
  rst_pin: GPIO23
  pa_pin: BOOST
  pa_power: 17
  bandwidth: 125_0kHz
  crc_enable: true
  frequency: 868920000
  modulation: LORA
  rx_start: true
  sync_value: 0x12
  spreading_factor: 10
  coding_rate: CR_4_5
  on_packet:
    then:
      - lambda: |-
          // Print raw packet as hex
          ESP_LOGI("LoRa", "Packet HEX: %s", format_hex(x).c_str());
          
          // Print packet length
          ESP_LOGI("LoRa", "Length: %u bytes", x.size());
          
          // Print payload as ASCII (if printable)
          std::string payload = "";
          for (auto b : x) {
            if (isprint(b)) payload += b;
            else payload += '.';
          }
          ESP_LOGI("LoRa", "Payload: %s", payload.c_str());
          
          if (payload.find("minutecounter") != std::string::npos) {
            ESP_LOGI("LoRa", "Minute counter packet received!");
            id(gatewaycount) += 1;
          } 
          else if (payload.find("temperatura") != std::string::npos) {
            ESP_LOGI("LoRa", "Temperature packet received!");
            id(temperaturecount) += 1;
          } 
          else {
            ESP_LOGI("LoRa", "Unknown packet type: %s", payload.c_str());
          }          
          
          id(totalcount) += 1;
          


          
packet_transport:
  platform: sx127x
  update_interval: 60s
  providers:
    - name: lorasender1

       
# OLED Display
display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    lambda: |-

        // Now print safely
        it.printf(0, 0, id(display_font), "TOTAL: %d", id(totalcount));
        it.printf(0, 16, id(display_font), "GTW 1: %d", id(gatewaycount));
        it.printf(0, 32, id(display_font), "GTW 2: %d", id(temperaturecount));
      
font:
  - file: "gfonts://Roboto"
    id: display_font
    size: 14
   