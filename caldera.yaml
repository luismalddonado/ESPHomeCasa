esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true

bluetooth_proxy:
  active: true

interval:
  - interval: 1440min
    startup_delay: 1440min
    then:
      - logger.log: "Rebooting device (scheduled restart)..."
      - delay: 200ms
      - button.press: restart_button
      
button:
  - platform: restart
    id: restart_button
    name: "Restart sensor caldera"
    
one_wire:
  - platform: gpio
    id: temperaturaacumuladorsolarpin
    pin: GPIO19

sensor:
  - platform: wifi_signal
    name: "WiFi Signal Strength"
    id: wifisignal
    update_interval: 60s
  - platform: dallas_temp
    address: 0x390000003478a228
    name: "Temperatura acumulador"
    accuracy_decimals: 2
    one_wire_id: temperaturaacumuladorsolarpin
    id: temperaturaacumuladorsolar
  - platform: dallas_temp
    address: 0x2c000000be74d028
    name: "Temperatura placas solares"
    accuracy_decimals: 2
    one_wire_id: temperaturaacumuladorsolarpin
    id: temperaturaplacassolares
#  - platform: homeassistant
#    name: "Temperatura caldera"
#    id: temperaturacaldera
#    entity_id: sensor.termostato_caldera
    
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO23
      mode: INPUT_PULLUP
      inverted: true
    name: "Circulacion placas solares"
    device_class: power

